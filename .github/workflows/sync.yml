name: FMI to Windguru Sync

on:
  # This listens for the external "ping"
  repository_dispatch:
    types: [trigger-weather-sync]
  # Keeps the "Run workflow" button in GitHub for testing
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Sync Script
        env:
          # Your secrets stay exactly the same
          WG_UID_1: ${{ secrets.WG_UID_1 }}
          WG_PASS_1: ${{ secrets.WG_PASS_1 }}
          WG_UID_2: ${{ secrets.WG_UID_2 }}
          WG_PASS_2: ${{ secrets.WG_PASS_2 }}
          WG_UID_3: ${{ secrets.WG_UID_3 }}
          WG_PASS_3: ${{ secrets.WG_PASS_3 }}
        run: python sync_weather.py
