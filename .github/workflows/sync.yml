name: FMI to Windguru Sync

on:
  schedule:
    # This runs every 10 minutes (standard cron syntax)
    - cron: '*/10 * * * *'
  workflow_dispatch: # This allows you to run it manually for testing

jobs:
  run-sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Sync Script
        env:
          # This connects your GitHub Secrets to the Python script
          WG_UID_1: ${{ secrets.WG_UID_1 }}
          WG_PASS_1: ${{ secrets.WG_PASS_1 }}
          WG_UID_2: ${{ secrets.WG_UID_2 }}
          WG_PASS_2: ${{ secrets.WG_PASS_2 }}
        run: python sync_weather.py
