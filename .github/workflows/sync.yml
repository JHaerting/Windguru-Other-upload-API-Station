name: FMI to Windguru Sync

on:
  # This listens for the external "ping" from cron-job.org
  repository_dispatch:
    types: [trigger-weather-sync]
  # Keeps the "Run workflow" button in GitHub for testing
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Crucial: This allows the bot to update your README and JSON
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Sync Script
        env:
          # Add/modify your secrets here depending on the sync_weather.py file.
          WG_UID_1: ${{ secrets.WG_UID_1 }}
          WG_PASS_1: ${{ secrets.WG_PASS_1 }}
          WG_UID_2: ${{ secrets.WG_UID_2 }}
          WG_PASS_2: ${{ secrets.WG_PASS_2 }}
          WG_UID_3: ${{ secrets.WG_UID_3 }}
          WG_PASS_3: ${{ secrets.WG_PASS_3 }}
          WG_UID_4: ${{ secrets.WG_UID_4 }}
          WG_PASS_4: ${{ secrets.WG_PASS_4 }}
        run: python sync_weather.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add wind_history.json README.md
          # The "|| exit 0" prevents the workflow from failing if there are no changes to commit
          git commit -m "Auto-update wind stats and history" || exit 0
          git push
