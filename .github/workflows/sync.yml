name: FMI to Windguru Sync

on:
  repository_dispatch:
    types: [trigger-weather-sync]
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the script to update README and JSON
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Sync Script
        env:
          WG_UID_1: ${{ secrets.WG_UID_1 }}
          WG_PASS_1: ${{ secrets.WG_PASS_1 }}
          WG_UID_2: ${{ secrets.WG_UID_2 }}
          WG_PASS_2: ${{ secrets.WG_PASS_2 }}
          WG_UID_3: ${{ secrets.WG_UID_3 }}
          WG_PASS_3: ${{ secrets.WG_PASS_3 }}
        run: python sync_weather.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add wind_history.json README.md
          git commit -m "Auto-update wind stats" || exit 0
          git pushname: FMI to Windguru Sync

on:
  # This listens for the external "ping"
  repository_dispatch:
    types: [trigger-weather-sync]
  # Keeps the "Run workflow" button in GitHub for testing
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Sync Script
        env:
          # Your secrets stay exactly the same
          WG_UID_1: ${{ secrets.WG_UID_1 }}
          WG_PASS_1: ${{ secrets.WG_PASS_1 }}
          WG_UID_2: ${{ secrets.WG_UID_2 }}
          WG_PASS_2: ${{ secrets.WG_PASS_2 }}
          WG_UID_3: ${{ secrets.WG_UID_3 }}
          WG_PASS_3: ${{ secrets.WG_PASS_3 }}
        run: python sync_weather.py
